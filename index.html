<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --em:#0F6E56;--eml:#E1F5EE;--emm:#1D9E75;--emd:#085041;--emt:#04342C;
  --bam:#BA7517;--baml:#FAEEDA;--bamm:#EF9F27;--bamd:#854F0B;--bamt:#412402;
  --wr:#791F1F;--wrl:#FCEBEB;
  --bg:#f0f4f1;
  --card:#ffffff;
  --text:#1a1a1a;
  --text2:#666666;
  --text3:#999999;
  --border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.18);
  --surf:#f5f5f5;
  --r:14px;--rsm:10px;--rpill:20px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0d1410;
    --card:#1c2420;
    --text:#e8f0ec;
    --text2:#8a9e94;
    --text3:#556860;
    --border:rgba(255,255,255,0.1);
    --border2:rgba(255,255,255,0.18);
    --surf:#242e2a;
    --eml:#0d2e22;--emd:#9FE1CB;--emt:#c8f0e0;
    --baml:#2e1f00;--bamd:#FAC775;--bamt:#fdebc0;
    --wrl:#2e0e0e;--wr:#f09595;
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:16px;line-height:1.4;overscroll-behavior:none}
body.modal-open{overflow:hidden}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* NAV */
.nav{background:var(--em);padding:16px 16px 13px;padding-top:max(16px,env(safe-area-inset-top))}
.nt{font-size:18px;font-weight:600;color:#E1F5EE;letter-spacing:-0.3px}
.ns{font-size:12px;color:#9FE1CB;margin-top:2px}
.nav-row{display:flex;align-items:center;gap:12px;background:var(--em);padding:16px 16px 13px;padding-top:max(16px,env(safe-area-inset-top))}
.bb{border:none;background:none;color:#9FE1CB;font-size:15px;display:flex;align-items:center;gap:3px;cursor:pointer;padding:4px 0;font-family:inherit;-webkit-tap-highlight-color:transparent}
.bb i{font-size:22px}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:0.5px solid var(--border);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:10px 4px 8px;border:none;background:none;color:var(--text3);font-size:11px;font-family:inherit;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--em);border-bottom-color:var(--em)}
.tab i{font-size:22px}

/* WEEK PILLS */
.wpills{display:flex;gap:6px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}
.wpills::-webkit-scrollbar{display:none}
.wpill{padding:5px 14px;border-radius:var(--rpill);font-size:13px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#9FE1CB;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;-webkit-tap-highlight-color:transparent}
.wpill.on{background:var(--bam);color:#fff;border-color:var(--bam)}

/* LAYOUT */
.pg{display:none;flex:1;overflow-y:auto}
.pg.on{display:block}
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:14px}
.sc{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:16px;text-align:center}
.sv{font-size:28px;font-weight:600;color:var(--em)}
.sl{font-size:11px;color:var(--text2);margin-top:3px}
.slbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;padding:16px 15px 8px}
.card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin:0 14px 12px;overflow:hidden}

/* DAY ROWS */
.dr{padding:14px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:0.5px solid var(--border);-webkit-tap-highlight-color:transparent}
.dr:last-child{border-bottom:none}
.dr:active{background:var(--eml)}
.di{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--eml)}
.dn{font-size:15px;font-weight:500;color:var(--text)}
.df{font-size:12px;color:var(--text2);margin-top:2px}
.pb{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.pf{height:100%;background:var(--em);border-radius:2px;transition:width 0.3s}
.dbg{font-size:11px;padding:4px 9px;border-radius:var(--rpill);white-space:nowrap;flex-shrink:0}
.bem{background:var(--eml);color:var(--emd)}
.bgr{background:var(--surf);color:var(--text2)}
.nbox{margin:0 14px 14px;background:var(--eml);border-radius:var(--r);padding:13px 15px;font-size:13px;color:var(--emt);line-height:1.65}

/* SECTION HEADER */
.slh{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:10px 15px 8px;background:var(--eml);color:var(--emd);border-bottom:0.5px solid var(--border)}

/* EXERCISE ROWS */
.er{padding:13px 15px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.er:last-child{border-bottom:none}
.er:active{background:var(--eml)}
.em{flex:1;min-width:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.en{font-size:15px;font-weight:500;color:var(--text)}
.ed{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.ew{font-size:11px;color:var(--wr);margin-top:5px;display:flex;align-items:flex-start;gap:3px;line-height:1.4}
.ew i{flex-shrink:0;margin-top:1px}
.el{font-size:12px;color:var(--em);display:flex;align-items:center;gap:3px;margin-top:5px;font-weight:500}
.ea{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;padding-top:2px}
.ib{border:none;background:none;cursor:pointer;padding:5px;display:flex;align-items:center;justify-content:center;border-radius:9px;color:var(--text3);-webkit-tap-highlight-color:transparent}
.ib:active{background:var(--surf)}
.ab{font-size:11px;color:var(--em);background:var(--eml);border:none;border-radius:var(--rpill);padding:4px 10px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;-webkit-tap-highlight-color:transparent}
.ab:active{opacity:0.7}

/* ALT PANEL */
.ap{background:var(--eml);border-top:0.5px solid var(--border);padding:11px 15px 14px;display:none}
.ap.on{display:block}
.albl{font-size:10px;color:var(--emd);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.an{font-size:14px;font-weight:500;color:var(--emt);margin-bottom:3px}
.ad{font-size:12px;color:var(--emd);line-height:1.5}

/* DAY META BAR */
.dmr{padding:12px 15px;display:flex;background:var(--card);border-bottom:0.5px solid var(--border)}
.dmi{flex:1;text-align:center;border-right:0.5px solid var(--border)}
.dmi:last-child{border-right:none}
.dmv{font-size:14px;font-weight:600;color:var(--em)}
.dml{font-size:11px;color:var(--text2);margin-top:2px}

/* MODAL OVERLAY — true fixed center */
.mwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;align-items:flex-start;justify-content:center;padding:60px 16px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mwrap.on{display:flex}
@keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(-12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mbox{background:var(--card);border-radius:22px;width:100%;max-width:440px;flex-shrink:0;animation:modalIn 0.2s ease;overflow:hidden}
.mhdr{padding:16px 16px 13px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--card);z-index:2;border-radius:22px 22px 0 0}
.mt{font-size:17px;font-weight:600;color:var(--text);flex:1;letter-spacing:-0.2px}
.ms{font-size:12px;color:var(--text2);margin-top:3px}
.xbtn{border:none;background:var(--surf);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text2);-webkit-tap-highlight-color:transparent}
.mbdy{padding:15px 16px 24px}

/* MODAL CONTENT */
.cbox{background:var(--eml);border-radius:var(--rsm);padding:12px 13px;font-size:13px;color:var(--emt);line-height:1.65;margin-bottom:12px}
.wbox{background:var(--wrl);border-radius:var(--rsm);padding:12px 13px;font-size:13px;color:var(--wr);line-height:1.65;margin-bottom:12px}
.vbtn{display:flex;align-items:center;gap:9px;background:var(--em);border:none;border-radius:var(--rsm);padding:11px 15px;font-size:14px;color:#fff;cursor:pointer;font-family:inherit;margin-bottom:14px;width:100%;font-weight:500;-webkit-tap-highlight-color:transparent}
.vbtn i{font-size:18px}
.vbtn:active{opacity:0.85}
.divl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;padding:13px 0 8px;border-top:0.5px solid var(--border);margin-top:6px}
.fr{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.fg{margin-bottom:12px}
.fl{font-size:13px;color:var(--text2);margin-bottom:6px;display:block}
input[type=number],input[type=text],textarea,select{width:100%;padding:11px 13px;border:0.5px solid var(--border2);border-radius:var(--rsm);background:var(--surf);color:var(--text);font-size:15px;font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus{outline:none;border-color:var(--em);box-shadow:0 0 0 3px rgba(15,110,86,0.15)}
textarea{height:68px;resize:none;line-height:1.5}
.rpeg{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-top:5px}
.rb{padding:9px 4px;border-radius:9px;font-size:14px;border:0.5px solid var(--border2);background:var(--surf);color:var(--text2);cursor:pointer;text-align:center;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background 0.15s}
.rb.on{background:var(--em);color:#fff;border-color:var(--em)}
.ar{display:flex;gap:10px;margin-top:14px}
.btn{border-radius:var(--rsm);padding:13px 16px;font-size:15px;font-weight:500;border:none;cursor:pointer;font-family:inherit;flex:1;text-align:center;-webkit-tap-highlight-color:transparent}
.bpri{background:var(--em);color:#fff}
.bpri:active{opacity:0.85}
.bout{background:var(--surf);color:var(--text);border:0.5px solid var(--border2)}
.bout:active{opacity:0.7}
.bdng{background:var(--wrl);color:var(--wr)}
.bdng:active{opacity:0.7}
.pe{font-size:13px;color:var(--text2);padding:8px 0;border-bottom:0.5px solid var(--border);line-height:1.5}
.pe:last-child{border-bottom:none}

/* LOG SCREEN */
.le{padding:13px 15px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.le:last-child{border-bottom:none}
.ln{font-size:14px;font-weight:500;color:var(--text)}
.ld{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.ldt{font-size:11px;color:var(--text3);white-space:nowrap;margin-top:2px}

/* BENCHMARK SCREEN */
.bf{padding:13px 15px;border-bottom:0.5px solid var(--border)}
.bf:last-child{border-bottom:none}
.bl{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.4}

/* EMPTY STATE */
.empty{text-align:center;padding:64px 24px;color:var(--text2)}
.empty i{font-size:48px;display:block;margin-bottom:16px;color:var(--text3)}
.empty p{font-size:15px;line-height:1.7}

/* EXPORT SUCCESS */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--em);color:#fff;padding:12px 20px;border-radius:var(--rpill);font-size:14px;font-weight:500;display:none;z-index:999;white-space:nowrap}
.toast.show{display:block}
</style>
</head>

<script>

function sav(){try{localStorage.setItem('mb_logs',JSON.stringify(logs));localStorage.setItem('mb_bmks',JSON.stringify(bmks));}catch(e){}}
function gLogs(di,en,wk){return logs.filter(function(l){return l.d===di&&l.e===en&&l.w===wk;});}
function dProg(day){
  var names=[];
  day.secs.forEach(function(s){s.items.forEach(function(i){names.push(i.n);});});
  var done=logs.filter(function(l){return l.d===day.id&&l.w===cw&&names.indexOf(l.e)>-1;}).length;
  return{done:done,total:names.length};
}

function go(n){
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('on',i===n);});

}

  var entry={
    id:Date.now(),
    date:new Date().toISOString().split('T')[0],
    w:cw,d:dayId,dl:dl,e:exName,
    sets:document.getElementById('mS')?document.getElementById('mS').value:'',
    reps:document.getElementById('mR')?document.getElementById('mR').value:'',
    weight:document.getElementById('mW')?document.getElementById('mW').value:'',
    time:document.getElementById('mT')?document.getElementById('mT').value:'',
    rpe:sr,
    notes:document.getElementById('mN')?document.getElementById('mN').value:''
  };
  if(isSport){
    entry.sportDur=document.getElementById('mDur')?document.getElementById('mDur').value:'';
    entry.sportCal=document.getElementById('mCal')?document.getElementById('mCal').value:'';
    entry.sportHR=document.getElementById('mHR')?document.getElementById('mHR').value:'';
    entry.sportPeak=document.getElementById('mPeak')?document.getElementById('mPeak').value:'';
    entry.sportFeel=selFeel||'';
    entry.sportAnkle=selAnkle!==null?selAnkle:'';
  }
  logs.push(entry);
  sav();sr=null;selFeel=null;selAnkle=null;closeM();
  if(cd)openDay(cd.id);else renderHome();
}

function delL(dayId,exEnc){
  var exName=decodeURIComponent(exEnc);
  var idx=-1;
  for(var i=logs.length-1;i>=0;i--){if(logs[i].e===exName&&logs[i].d===dayId&&logs[i].w===cw){idx=i;break;}}
  if(idx>-1)logs.splice(idx,1);
  sav();closeM();
  if(cd)openDay(cd.id);
}

function renderLog(){
  cd=null;
  renderNav('Training log','All sessions logged',null);
  if(!logs.length){
    document.getElementById('pg1').innerHTML='<div class="empty"><i class="ti ti-clipboard-list" aria-hidden="true"></i><p>No sets logged yet.<br>Go to Home, pick a day,<br>and tap any exercise to start.</p></div>';
    return;
  }
  var grouped={};
  var rev=logs.slice().reverse();
  rev.forEach(function(l){
    var k=(W[l.w]||'Week '+(l.w+1))+' — '+(l.dl||l.d);
    if(!grouped[k])grouped[k]=[];
    grouped[k].push(l);
  });
  var h='';
  Object.keys(grouped).forEach(function(k){
    h+='<div class="slbl">'+k+'</div><div class="card">';
    grouped[k].forEach(function(l){
      var isSport=(l.d==='d6');
      var parts=[];
      if(isSport){
        if(l.sportDur)parts.push(l.sportDur+' min');
        if(l.sportCal)parts.push(l.sportCal+' cal');
        if(l.sportHR)parts.push('Avg HR '+l.sportHR+'bpm');
        if(l.sportPeak)parts.push('Peak '+l.sportPeak+'bpm');
        if(l.sportFeel)parts.push(l.sportFeel);
        if(l.sportAnkle!==undefined&&l.sportAnkle!=='')parts.push('Ankle '+l.sportAnkle+'/5');
      } else {
        if(l.sets&&l.reps)parts.push(l.sets+' sets x '+l.reps+' reps');
        else if(l.sets)parts.push(l.sets+' sets');
        else if(l.reps)parts.push(l.reps+' reps');
        if(l.weight)parts.push('@ '+l.weight+'lb');
        if(l.time)parts.push(l.time+'s');
        if(l.rpe)parts.push('RPE '+l.rpe);
      }
      h+='<div class="le"><div style="flex:1;min-width:0"><div class="ln">'+l.e+'</div>';
      h+='<div class="ld">'+parts.join(' · ')+'</div>';
      if(l.notes)h+='<div class="ld" style="font-style:italic;margin-top:2px">'+l.notes+'</div>';
      h+='</div><div class="ldt">'+l.date+'</div></div>';
    });
    h+='</div>';
  });
  document.getElementById('pg1').innerHTML=h;
}

function renderBench(){
  cd=null;
  renderNav('Week 4 benchmarks','Run at end of Block 1',null);
  var h='<div class="nbox" style="margin:14px">Run these at the end of Week 4. These are movement quality checks — not max effort tests. All results export with your training log CSV.</div>';
  BENCH.forEach(function(cat){
    h+='<div class="slbl">'+cat.em+' '+cat.cat+'</div><div class="card">';
    cat.fields.forEach(function(f){
      h+='<div class="bf"><label class="bl" for="bm'+f.k+'">'+f.l+'</label>';
      h+='<input type="text" id="bm'+f.k+'" value="'+(bmks[f.k]||'')+'" placeholder="Enter result…" oninput="bmks[\''+f.k+'\']=this.value;sav()"></div>';
    });
    h+='</div>';
  });
  h+='<div style="padding:0 14px 32px"><button class="btn bpri" style="width:100%;padding:14px" onclick="doExport()"><i class="ti ti-download" aria-hidden="true"></i>  Export all data to CSV</button></div>';
  document.getElementById('pg2').innerHTML=h;
}

function doExport(){
  var rows=[['Date','Week','Day','Exercise','Sets','Reps','Weight (lbs)','Time (sec)','RPE','Duration (min)','Calories','Avg HR','Peak HR','Feel','Ankle (0-5)','Notes']];
  logs.forEach(function(l){
    rows.push([
      l.date,W[l.w]||('Week '+(l.w+1)),l.dl||l.d,l.e,
      l.sets||'',l.reps||'',l.weight||'',l.time||'',l.rpe||'',
      l.sportDur||'',l.sportCal||'',l.sportHR||'',l.sportPeak||'',l.sportFeel||'',
      (l.sportAnkle!==undefined&&l.sportAnkle!=='')?l.sportAnkle:'',
      '"'+(l.notes||'').replace(/"/g,'""')+'"'
    ]);
  });
  rows.push([]);rows.push(['BENCHMARKS']);rows.push(['Category','Metric','Result']);
  BENCH.forEach(function(cat){cat.fields.forEach(function(f){rows.push([cat.cat,f.l,bmks[f.k]||'']);});});
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  try{
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download='Karan_Block1_TrainingLog_'+new Date().toISOString().split('T')[0]+'.csv';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    var t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2500);
  }catch(e){alert('Export failed. Try from a desktop browser.');}
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('on',i===0);});
}

renderHome();
</script>
</body>
</html>
